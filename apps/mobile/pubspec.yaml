name: mindos
description: mindOS — personal intelligence layer (mobile-first, Flutter).
publish_to: "none"
version: 0.0.1+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # State management
  flutter_riverpod: ^2.5.1
  # Navigation
  go_router: ^14.2.0
  # HTTP client (talks to the NestJS API)
  http: ^1.2.2
  # Local storage / offline (Drift = SQLite). Wired into features in F1.
  drift: ^2.19.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0
  # Client-generated ids (used as Idempotency-Key for the offline outbox).
  uuid: ^4.4.0
  # Connectivity signal that triggers the outbox drain (SyncService).
  connectivity_plus: ^6.0.0
  # Persists the auth session (tokens) across app restarts. Works on web
  # (localStorage) and mobile (native prefs) with one API.
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # Drift code generation (used from F1 onwards)
  drift_dev: ^2.19.0
  build_runner: ^2.4.0
  # Native SQLite library so `NativeDatabase.memory()` works under `flutter test`.
  sqlite3: ^2.4.0

flutter:
  uses-material-design: true
  fonts:
    # Inter (variable font) — premium, neutral typeface for the mindOS identity.
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttf
