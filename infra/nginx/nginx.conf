# mindOS — Nginx reverse proxy (reference config).
# Routes public traffic to the NestJS API. The Python AI service is internal
# only and is NOT exposed publicly (it is reached by the API over the internal
# network). Cloudflare sits in front of Nginx in production (#06).

events {}

http {
  upstream api_upstream {
    server api:3000;
  }

  server {
    listen 80;
    server_name _;

    # Business API (public)
    location /v1/ {
      proxy_pass http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # WebSocket support (realtime, ADR-010)
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
