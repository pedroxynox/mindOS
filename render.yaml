# mindOS — Render Blueprint (services + queue on Render; database on Neon).
#
# The DATABASE lives on Neon (free Postgres WITH pgvector) because the founder's
# single free Render Postgres slot is already used by another project, and
# Neon's free tier does NOT expire (Render's free DB is deleted ~30 days). Neon
# is standard Postgres, so it stays fully portable (can migrate later).
#
# This Blueprint therefore creates 3 things on Render: the Key Value store
# (Redis for BullMQ), the NestJS API, and the Python AI service (which also runs
# the comprehension worker). The 2 Neon connection strings + the OpenAI key are
# filled once in the dashboard (marked `sync: false`). Full walkthrough:
# docs/06-infrastructure/DEPLOY_RENDER.md.

services:
  # --- Redis / queue (BullMQ) ------------------------------------------------
  - type: keyvalue
    name: mindos-redis
    plan: free
    ipAllowList: []          # empty = reachable only from your Render services
    maxmemoryPolicy: noeviction  # a job queue must NOT evict keys

  # --- NestJS business API ---------------------------------------------------
  - type: web
    name: mindos-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: apps/api
    # FREE for now (see it working). Free web services SLEEP after ~15 min and
    # cold-start on the next request. Switch to `starter` (~$7/mo) for always-on.
    plan: free
    healthCheckPath: /v1/health
    # Free tier does NOT support `preDeployCommand`, so migrations run at
    # CONTAINER START instead: `DATABASE_URL=$MIGRATION_DATABASE_URL` is scoped
    # to JUST the migrate command (Neon OWNER role) — it creates the tables, RLS
    # policies, the non-owner `mindos_app` role and the pgvector extension — and
    # then the app starts with its own env `DATABASE_URL` (the mindos_app role).
    # `prisma migrate deploy` is idempotent, so re-running it on each start/wake
    # is a safe no-op once migrations are applied.
    dockerCommand: "sh -c 'DATABASE_URL=\"$MIGRATION_DATABASE_URL\" npx prisma migrate deploy && node dist/main'"
    envVars:
      # Neon OWNER connection (the default role) — migrations only. Paste the
      # Neon connection string (keep `?sslmode=require`). Use the DIRECT (non-
      # pooled) Neon URL here for migrations.
      - key: MIGRATION_DATABASE_URL
        sync: false
      # Runtime app connection = NON-OWNER role `mindos_app` (RLS fail-closed):
      # same Neon host/db but user/pass = mindos_app / mindos_app, keep
      # `?sslmode=require`.
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: mindos-redis
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: mindos-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: mindos-redis
          property: port
      - key: REDIS_PASSWORD    # copy from the Key Value connection info (see guide)
        sync: false
      - key: JWT_SECRET
        generateValue: true    # Render generates a strong secret once
      - key: AI_SERVICE_URL
        fromService:
          type: web
          name: mindos-ai
          property: hostport    # internal host:port of the AI service
      # Voice is deferred, so S3_* (audio storage) is intentionally unset.

  # --- Python AI service + comprehension worker ------------------------------
  - type: web
    name: mindos-ai
    runtime: docker
    dockerfilePath: apps/ai/Dockerfile
    dockerContext: apps/ai
    # FREE for now. NOTE: a free (sleeping) service can't drain the queue 24/7 —
    # it wakes on an HTTP hit and then processes. Fine to TEST; switch to
    # `starter` (~$7/mo) when you want the worker always draining the queue.
    plan: free
    healthCheckPath: /health
    envVars:
      - key: WORKER_ENABLED
        value: "true"        # this instance consumes the 'understanding' queue
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: gpt-5.4-mini  # the winning model (R-001 gate passed)
      - key: OPENAI_API_KEY
        sync: false          # paste your OpenAI key once (secret)
      # Same non-owner Neon app role as the API (RLS applies to the worker too).
      # asyncpg honours `?sslmode=require` from the DSN — keep it in the URL.
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: mindos-redis
          property: connectionString
