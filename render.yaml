# mindOS — Render Blueprint (services + queue on Render; database on Neon).
#
# The DATABASE lives on Neon (free Postgres WITH pgvector) because the founder's
# single free Render Postgres slot is already used by another project, and
# Neon's free tier does NOT expire (Render's free DB is deleted ~30 days). Neon
# is standard Postgres, so it stays fully portable (can migrate later).
#
# This Blueprint therefore creates 3 things on Render: the Key Value store
# (Redis for BullMQ), the NestJS API, and the Python AI service (which also runs
# the comprehension worker). The 2 Neon connection strings + the OpenAI key are
# filled once in the dashboard (marked `sync: false`). Full walkthrough:
# docs/06-infrastructure/DEPLOY_RENDER.md.

services:
  # --- Redis / queue (BullMQ) ------------------------------------------------
  - type: keyvalue
    name: mindos-redis
    plan: free
    ipAllowList: []          # empty = reachable only from your Render services
    maxmemoryPolicy: noeviction  # a job queue must NOT evict keys

  # --- NestJS business API ---------------------------------------------------
  - type: web
    name: mindos-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: apps/api
    # FREE for now (see it working). Free web services SLEEP after ~15 min and
    # cold-start on the next request. Switch to `starter` (~$7/mo) for always-on.
    plan: free
    healthCheckPath: /v1/health
    # Migrations run at CONTAINER START via the image entrypoint
    # (apps/api/docker-entrypoint.sh): it runs `prisma migrate deploy` as the
    # Neon OWNER (MIGRATION_DATABASE_URL, scoped to that command — creates
    # tables, RLS, the `mindos_app` role and pgvector) then starts the app with
    # its own DATABASE_URL (mindos_app). Free tier has no preDeployCommand, and a
    # script avoids shell-quoting issues. This dockerCommand just invokes it.
    dockerCommand: "sh ./docker-entrypoint.sh"
    envVars:
      # Neon OWNER connection (the default role) — migrations only. Paste the
      # Neon connection string (keep `?sslmode=require`). Use the DIRECT (non-
      # pooled) Neon URL here for migrations.
      - key: MIGRATION_DATABASE_URL
        sync: false
      # Runtime app connection = NON-OWNER role `mindos_app` (RLS fail-closed):
      # same Neon host/db but user/pass = mindos_app / mindos_app, keep
      # `?sslmode=require`.
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: mindos-redis
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: mindos-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: mindos-redis
          property: port
      - key: REDIS_PASSWORD    # copy from the Key Value connection info (see guide)
        sync: false
      - key: JWT_SECRET
        generateValue: true    # Render generates a strong secret once
      # Which web origin(s) may call the API from a browser (CORS). This is the
      # public URL of the mindos-web static site below. Comma-separate to allow
      # more (e.g. a custom domain later).
      - key: CORS_ORIGIN
        value: https://mindos-web.onrender.com
      - key: AI_SERVICE_URL
        fromService:
          type: web
          name: mindos-ai
          property: hostport    # internal host:port of the AI service
      # Voice is deferred, so S3_* (audio storage) is intentionally unset.

  # --- Python AI service + comprehension worker ------------------------------
  - type: web
    name: mindos-ai
    runtime: docker
    dockerfilePath: apps/ai/Dockerfile
    dockerContext: apps/ai
    # FREE for now. NOTE: a free (sleeping) service can't drain the queue 24/7 —
    # it wakes on an HTTP hit and then processes. Fine to TEST; switch to
    # `starter` (~$7/mo) when you want the worker always draining the queue.
    plan: free
    healthCheckPath: /health
    envVars:
      - key: WORKER_ENABLED
        value: "true"        # this instance consumes the 'understanding' queue
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: gpt-5.4-mini  # the winning model (R-001 gate passed)
      - key: OPENAI_API_KEY
        sync: false          # paste your OpenAI key once (secret)
      # Same non-owner Neon app role as the API (RLS applies to the worker too).
      # asyncpg honours `?sslmode=require` from the DSN — keep it in the URL.
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: mindos-redis
          property: connectionString


  # --- Flutter web app (static site) -----------------------------------------
  # The same Flutter codebase compiled for the browser. Served for FREE as a
  # static site (static sites do NOT sleep, unlike free web services). The build
  # installs Flutter, generates Drift code, then `flutter build web`, baking in
  # the public API URL via --dart-define.
  - type: web
    name: mindos-web
    runtime: static
    # Build from repo root. Flutter isn't preinstalled on Render's static build
    # image, so we clone the stable SDK, generate code, and build web.
    buildCommand: >-
      git clone --depth 1 -b stable https://github.com/flutter/flutter.git "$HOME/flutter"
      && export PATH="$HOME/flutter/bin:$PATH"
      && git config --global --add safe.directory "$HOME/flutter"
      && cd apps/mobile
      && flutter pub get
      && dart run build_runner build --delete-conflicting-outputs
      && flutter build web --release --dart-define=API_BASE_URL="$API_BASE_URL"
    staticPublishPath: apps/mobile/build/web
    pullRequestPreviewsEnabled: false
    envVars:
      # Public URL of the API the browser will call. Update if the API service
      # is renamed or a custom domain is used.
      - key: API_BASE_URL
        value: https://mindos-api.onrender.com/v1
    # SPA fallback so deep links resolve to the app entry point.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
