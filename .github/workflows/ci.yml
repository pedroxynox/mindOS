name: CI

on:
  push:
    branches: [main]
  pull_request:

# Gates required before merge (Engineering Standards #05 §4.3, Infra #06 §5.1).
jobs:
  api:
    name: API (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm test
      - run: npm run build

  ai:
    name: AI (Python/FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --upgrade pip && pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy app
      - run: pytest

  mobile:
    name: Mobile (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter create . --project-name mindos --platforms=android
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
